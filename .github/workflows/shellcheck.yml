---
name: shellcheck
on:
  pull_request:
    paths:
      - "**/**.sh"

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run ShellCheck
        uses: bewuethr/shellcheck-action@a9a35d24117d4e357443332ffbd89022dd5832da
