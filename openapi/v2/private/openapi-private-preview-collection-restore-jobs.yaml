components:
    headers:
        HeaderRateLimitLimit:
            description: The maximum number of requests that a user can make within a specific time window.
            schema:
                type: integer
        HeaderRateLimitRemaining:
            description: The number of requests remaining in the current rate limit window before the limit is reached.
            schema:
                type: integer
        HeaderRetryAfter:
            description: The minimum time you should wait, in seconds, before retrying the API request. This header might be returned for 429 or 503 error responses.
            schema:
                type: integer
    parameters:
        collectionName:
            description: Human-readable label that identifies the collection.
            in: path
            name: collectionName
            required: true
            schema:
                example: mycoll
                type: string
        databaseName:
            description: Human-readable label that identifies the database.
            in: path
            name: databaseName
            required: true
            schema:
                example: mydb
                type: string
        end:
            description: Date and time when MongoDB Cloud stops reporting the metrics. This parameter expresses its value in the ISO 8601 timestamp format in UTC. Include this parameter when you do not set **period**.
            in: query
            name: end
            schema:
                format: date-time
                type: string
        envelope:
            description: Flag that indicates whether Application wraps the response in an `envelope` JSON object. Some API clients cannot access the HTTP response headers or status code. To remediate this, set envelope=true in the query. Endpoints that return a list of results use the results object as an envelope. Application adds the status parameter to the response body.
            in: query
            name: envelope
            schema:
                default: false
                type: boolean
        federationSettingsId:
            description: Unique 24-hexadecimal digit string that identifies your federation.
            in: path
            name: federationSettingsId
            required: true
            schema:
                example: 55fa922fb343282757d9554e
                pattern: ^([a-f0-9]{24})$
                type: string
        granularity:
            description: Duration that specifies the interval at which Atlas reports the metrics. This parameter expresses its value in the ISO 8601 duration format in UTC.
            in: query
            name: granularity
            required: true
            schema:
                example: PT1M
                type: string
        groupId:
            description: |-
                Unique 24-hexadecimal digit string that identifies your project. Use the [/groups](#tag/Projects/operation/listProjects) endpoint to retrieve all projects to which the authenticated user has access.

                **NOTE**: Groups and projects are synonymous terms. Your group id is the same as your project id. For existing groups, your group/project id remains the same. The resource and corresponding endpoints use the term groups.
            in: path
            name: groupId
            required: true
            schema:
                example: 32b6e34b3d91647abb20e7b8
                pattern: ^([a-f0-9]{24})$
                type: string
        identityProviderId:
            description: Legacy 20-hexadecimal digit string that identifies the identity provider. This id can be found within the Federation Management Console > Identity Providers tab by clicking the info icon in the IdP ID row of a configured identity provider.
            in: path
            name: identityProviderId
            required: true
            schema:
                example: c2777a9eca931f29fc2f
                pattern: ^([a-f0-9]{20})$
                type: string
        includeCount:
            description: Flag that indicates whether the response returns the total number of items (`totalCount`) in the response.
            in: query
            name: includeCount
            schema:
                default: true
                type: boolean
        indexName:
            description: Human-readable label that identifies the index.
            in: path
            name: indexName
            required: true
            schema:
                example: myindex
                type: string
        itemsPerPage:
            description: Number of items that the response returns per page.
            in: query
            name: itemsPerPage
            schema:
                default: 100
                maximum: 500
                minimum: 1
                type: integer
        liveMigrationId:
            description: Unique 24-hexadecimal digit string that identifies the migration.
            in: path
            name: liveMigrationId
            required: true
            schema:
                example: 6296fb4c7c7aa997cf94e9a8
                pattern: ^([a-f0-9]{24})$
                type: string
        orgId:
            description: Unique 24-hexadecimal digit string that identifies the organization that contains your projects. Use the [`/orgs`](#tag/Organizations/operation/listOrganizations) endpoint to retrieve all organizations to which the authenticated user has access.
            in: path
            name: orgId
            required: true
            schema:
                example: 4888442a3354817a7320eb61
                pattern: ^([a-f0-9]{24})$
                type: string
        pageNum:
            description: Number of the page that displays the current set of the total objects that the response returns.
            in: query
            name: pageNum
            schema:
                default: 1
                minimum: 1
                type: integer
        period:
            description: Duration over which Atlas reports the metrics. This parameter expresses its value in the ISO 8601 duration format in UTC. Include this parameter when you do not set **start** and **end**.
            in: query
            name: period
            schema:
                example: PT10H
                type: string
        pretty:
            description: Flag that indicates whether the response body should be in the prettyprint format.
            in: query
            name: pretty
            schema:
                default: false
                externalDocs:
                    description: Prettyprint
                    url: https://en.wikipedia.org/wiki/Prettyprint
                type: boolean
        processId:
            description: Combination of hostname and IANA port that serves the MongoDB process. The host must be the hostname, fully qualified domain name (FQDN), or Internet Protocol address (IPv4 or IPv6) of the host that runs the MongoDB process (mongod or mongos). The port must be the IANA port on which the MongoDB process listens for requests.
            in: path
            name: processId
            required: true
            schema:
                example: my.host.name.com:27017
                pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}|([0-9a-f]{1,4}\:){7}([0-9a-f]{1,4})|(([a-z0-9]+\.){1,10}[a-z]+)?(\:[0-9]{4,5})$
                type: string
        sandboxConfigId:
            description: Unique 24-hexadecimal digit string that identifies the sandbox configuration.
            in: path
            name: sandboxConfigId
            required: true
            schema:
                example: 507f1f77bcf86cd799439011
                pattern: ^([a-f0-9]{24})$
                type: string
        start:
            description: Date and time when MongoDB Cloud begins reporting the metrics. This parameter expresses its value in the ISO 8601 timestamp format in UTC. Include this parameter when you do not set **period**.
            in: query
            name: start
            schema:
                format: date-time
                type: string
    responses:
        accepted:
            description: Accepted.
        badRequest:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint) No provider AWS exists.
                        error: 400
                        errorCode: VALIDATION_ERROR
                        reason: Bad Request
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Bad Request.
        conflict:
            content:
                application/json:
                    example:
                        detail: '(This is just an example, the exception may not be related to this endpoint) Cannot delete organization link while there is active migration in following project ids: 60c4fd418ebe251047c50554'
                        error: 409
                        errorCode: CANNOT_DELETE_ORG_ACTIVE_LIVE_MIGRATION_ATLAS_ORG_LINK
                        reason: Conflict
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Conflict.
        forbidden:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint)
                        error: 403
                        errorCode: CANNOT_CHANGE_GROUP_NAME
                        reason: Forbidden
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Forbidden.
        gone:
            content:
                application/json:
                    example:
                        detail: This happens when a resource is marked for sunset and the sunset date is in the past.
                        error: 410
                        errorCode: VERSION_GONE
                        reason: Gone
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Gone.
        internalServerError:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint)
                        error: 500
                        errorCode: UNEXPECTED_ERROR
                        reason: Internal Server Error
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Internal Server Error.
        methodNotAllowed:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint)
                        error: 405
                        errorCode: ATLAS_BACKUP_CANCEL_SHARD_RESTORE_JOB_NOT_ALLOWED
                        reason: Method Not Allowed
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Method Not Allowed.
        noBody:
            description: This endpoint does not return a response body.
        notFound:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint) Cannot find resource AWS
                        error: 404
                        errorCode: RESOURCE_NOT_FOUND
                        reason: Not Found
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Not Found.
        paymentRequired:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint)
                        error: 402
                        errorCode: NO_PAYMENT_INFORMATION_FOUND
                        reason: Payment Required
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Payment Required.
        tooManyRequests:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint)
                        error: 429
                        errorCode: RATE_LIMITED
                        reason: Too Many Requests
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Too Many Requests.
            headers:
                RateLimit-Limit:
                    $ref: '#/components/headers/HeaderRateLimitLimit'
                RateLimit-Remaining:
                    $ref: '#/components/headers/HeaderRateLimitRemaining'
                Retry-After:
                    $ref: '#/components/headers/HeaderRetryAfter'
        unauthorized:
            content:
                application/json:
                    example:
                        detail: (This is just an example, the exception may not be related to this endpoint)
                        error: 401
                        errorCode: NOT_ORG_GROUP_CREATOR
                        reason: Unauthorized
                    schema:
                        $ref: '#/components/schemas/ApiError'
            description: Unauthorized.
    schemas:
        ApiAtlasCollectionRestoreCollectionStateResponse:
            description: Collection-level state within a collection restore job.
            properties:
                effectiveTargetNamespace:
                    description: Actual target namespace after restore (e.g. after conflict rename).
                    readOnly: true
                    type: string
                restoredDocuments:
                    description: Number of documents restored so far.
                    format: int64
                    readOnly: true
                    type: integer
                sourceNamespace:
                    description: Source namespace that was requested to restore.
                    readOnly: true
                    type: string
                state:
                    description: Current state of this collection within the restore job.
                    enum:
                        - NOT_STARTED
                        - IN_PROGRESS
                        - FINALIZING
                        - NOT_FOUND
                        - UNSUPPORTED
                        - SUCCESSFUL
                        - ROLLBACK
                        - NOT_RESTORED
                        - FAILED
                        - INDEX_BUILD_FAILED
                    readOnly: true
                    type: string
                targetNamespace:
                    description: Requested target namespace for the restored collection.
                    readOnly: true
                    type: string
                totalDocuments:
                    description: Total document count for this collection.
                    format: int64
                    readOnly: true
                    type: integer
            type: object
        ApiAtlasCollectionRestoreJobRequest:
            description: Request body for creating a collection restore job.
            properties:
                collectionSuffix:
                    description: Optional suffix applied to restored collection names.
                    type: string
                collections:
                    description: List of collections to restore (up to 100 items).
                    items:
                        $ref: '#/components/schemas/ApiAtlasRestoreNamespaceView'
                    maxItems: 100
                    type: array
                databaseSuffix:
                    description: Optional suffix applied to restored database names.
                    type: string
                databases:
                    description: List of databases to restore (up to 100 items).
                    items:
                        $ref: '#/components/schemas/ApiAtlasRestoreNamespaceView'
                    maxItems: 100
                    type: array
                indexStrategy:
                    description: Strategy for restoring indexes (all, none, or all except TTL).
                    enum:
                        - ALL
                        - NONE
                        - ALL_EXCEPT_TTL
                    type: string
                oplogInc:
                    description: Oplog increment for point-in-time restore.
                    format: int32
                    type: integer
                oplogTs:
                    description: Oplog timestamp (seconds part) for point-in-time restore.
                    format: int32
                    type: integer
                overwriteStrategy:
                    description: Strategy for overwriting existing data (new if exists or overwrite if exists).
                    enum:
                        - NEW_IF_EXISTS
                        - OVERWRITE_IF_EXISTS
                    type: string
                pointInTimeUtcSeconds:
                    description: Point-in-time restore time in seconds since UNIX epoch.
                    format: int32
                    type: integer
                snapshotId:
                    description: ID of the snapshot to restore.
                    example: 32b6e34b3d91647abb20e7b8
                    pattern: ^([a-f0-9]{24})$
                    type: string
                targetClusterName:
                    description: Target cluster name.
                    type: string
                targetGroupId:
                    description: Unique 24-hexadecimal digit string that identifies the target group.
                    example: 32b6e34b3d91647abb20e7b8
                    pattern: ^([a-f0-9]{24})$
                    type: string
            required:
                - indexStrategy
                - overwriteStrategy
                - targetClusterName
                - targetGroupId
            type: object
        ApiAtlasCollectionRestoreJobResponse:
            description: Collection restore job summary including the list of databases and collections in the restore scope (up to 100 items each).
            properties:
                collectionSuffix:
                    description: Suffix applied to restored collection names.
                    type: string
                collections:
                    description: List of collections in the restore scope (up to 100 items).
                    items:
                        $ref: '#/components/schemas/ApiAtlasRestoreNamespaceView'
                    maxItems: 100
                    type: array
                createdAt:
                    description: Date and time when the restore job was created (ISO 8601 format in UTC).
                    format: date-time
                    readOnly: true
                    type: string
                databaseSuffix:
                    description: Suffix applied to restored database names.
                    type: string
                databases:
                    description: List of databases in the restore scope (up to 100 items).
                    items:
                        $ref: '#/components/schemas/ApiAtlasRestoreNamespaceView'
                    maxItems: 100
                    type: array
                errorMessage:
                    description: Error message when the job has failed or been canceled.
                    readOnly: true
                    type: string
                finishedAt:
                    description: Date and time when the restore job finished (ISO 8601 format in UTC).
                    format: date-time
                    readOnly: true
                    type: string
                id:
                    description: Unique 24-hexadecimal digit string that identifies the collection restore job.
                    example: 32b6e34b3d91647abb20e7b8
                    pattern: ^([a-f0-9]{24})$
                    readOnly: true
                    type: string
                indexStrategy:
                    description: Strategy for restoring indexes (all, none, or all except TTL).
                    enum:
                        - ALL
                        - NONE
                        - ALL_EXCEPT_TTL
                    type: string
                oplogInc:
                    description: Oplog increment for point-in-time restore.
                    format: int32
                    type: integer
                oplogTs:
                    description: Oplog timestamp (seconds part) for point-in-time restore.
                    format: int32
                    type: integer
                overwriteStrategy:
                    description: Strategy for overwriting existing data (new if exists or overwrite if exists).
                    enum:
                        - NEW_IF_EXISTS
                        - OVERWRITE_IF_EXISTS
                    type: string
                pointInTimeUtcSeconds:
                    description: Point-in-time restore time in seconds since UNIX epoch.
                    format: int32
                    type: integer
                snapshotId:
                    description: Unique 24-hexadecimal digit string that identifies the snapshot being restored.
                    example: 32b6e34b3d91647abb20e7b8
                    pattern: ^([a-f0-9]{24})$
                    type: string
                state:
                    description: Current state of the collection restore job.
                    enum:
                        - INITIALIZING
                        - IN_PROGRESS
                        - FINALIZING
                        - SUCCESSFUL
                        - CANCELED
                        - FAILED
                    readOnly: true
                    type: string
                targetClusterName:
                    description: Human-readable label that identifies the target cluster.
                    type: string
                targetGroupId:
                    description: Unique 24-hexadecimal digit string that identifies the target group.
                    example: 32b6e34b3d91647abb20e7b8
                    pattern: ^([a-f0-9]{24})$
                    type: string
            type: object
        ApiAtlasRestoreNamespaceView:
            description: Source and optional target namespace for a restore.
            properties:
                sourceNamespace:
                    description: Namespace requested to restore (e.g. database name or `database.collection`).
                    type: string
                targetNamespace:
                    description: Requested target namespace for the restored data; if empty, source namespace is used.
                    type: string
            required:
                - sourceNamespace
            type: object
        ApiError:
            properties:
                badRequestDetail:
                    $ref: '#/components/schemas/BadRequestDetail'
                detail:
                    description: Describes the specific conditions or reasons that cause each type of error.
                    type: string
                error:
